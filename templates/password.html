{% extends "base.html" %}
{% block title %}Password Check - Guardian{% endblock %}

{% block content %}
<div class="fade-in font-mono">
    <h1 class="font-bold text-white tracking-tight mb-2">PASSWORD CHECK</h1>
    <p class="text-[12px] text-dim mb-8">Check if a password has been exposed in data breaches and assess its strength.</p>

    <form id="pw-form" class="space-y-4">
        <div>
            <label class="block text-[11px] text-dim uppercase tracking-widest mb-2">Password</label>
            <div class="relative">
                <input type="password" name="password" id="pw-input" required autocomplete="off"
                    placeholder="Enter password to check..."
                    class="w-full bg-surface-1 border border-border-1 px-4 py-3 text-[13px] text-white font-mono placeholder:text-dim focus:border-accent/30 focus:outline-none transition-colors pr-12">
                <button type="button" onclick="togglePwVis()" aria-label="Toggle password visibility" class="absolute right-3 top-1/2 -translate-y-1/2 text-dim hover:text-muted transition-colors">
                    <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                    </svg>
                </button>
            </div>
        </div>

        <input type="hidden" name="mode" id="pw-mode" value="auto">

        <div class="flex items-center gap-3">
            <button type="submit" onclick="setPwMode('auto')"
                hx-post="/password/check" hx-target="#pw-result" hx-include="#pw-form"
                hx-indicator="#pw-loading"
                class="px-5 py-2.5 border border-accent/30 bg-accent/[0.05] hover:bg-accent/[0.12] text-accent text-[13px] uppercase tracking-widest transition-colors">
                Check <span class="text-accent/50">·</span> <span id="pw-btn-mode">AI</span>
            </button>
            <button type="submit" onclick="setPwMode('api')"
                hx-post="/password/check" hx-target="#pw-result" hx-include="#pw-form"
                hx-indicator="#pw-loading"
                class="px-5 py-2.5 border border-border-2 hover:border-accent/30 hover:bg-accent/[0.05] text-dim hover:text-accent text-[13px] uppercase tracking-widest transition-colors">
                Breach Scan
            </button>
        </div>
    </form>

    <div id="pw-loading" class="mt-8 htmx-indicator">
        <div class="py-6 border border-border-1 bg-white/[0.02] analyzing-pulse">
            <div class="flex items-center justify-center gap-2">
                <span class="text-[14px] text-dim uppercase tracking-[0.2em]">Checking</span>
                <span class="text-dim text-[14px]">...</span>
            </div>
        </div>
    </div>

    <div id="pw-result" class="mt-8"></div>
</div>

<script>
    function togglePwVis() {
        var input = document.getElementById('pw-input');
        input.type = input.type === 'password' ? 'text' : 'password';
    }
    function setPwMode(mode) {
        document.getElementById('pw-mode').value = mode;
    }
    function syncPwLabel() {
        var el = document.getElementById('pw-btn-mode');
        el.textContent = document.documentElement.dataset.mode === 'online' ? 'AI' : 'Offline';
    }
    syncPwLabel();
    new MutationObserver(syncPwLabel).observe(document.documentElement, { attributes: true, attributeFilter: ['data-mode'] });
</script>
{% endblock %}
