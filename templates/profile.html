{% extends "base.html" %}
{% block title %}Guardian{% endblock %}

{% block content %}
<div id="hero-wrap" class="fade-in font-mono space-glow pt-[12vh] transition-[padding] duration-[400ms] ease-out">
    <div class="text-center mb-10">
        <a href="/profiles" class="inline-flex items-center gap-2.5 px-4 py-2 border border-accent/20 bg-accent/[0.04] hover:bg-accent/[0.10] hover:border-accent/40 transition-colors">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-accent"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span class="text-[12px] text-white">{{ region_labels[profile.region] }}</span>
            <span class="text-[11px] text-dim">{{ work_labels[profile.work_situation] }}</span>
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-dim"><path d="M9 18l6-6-6-6"/></svg>
        </a>
    </div>

    <div id="run-btn-wrap" class="max-w-lg mx-auto mb-8">
        <div class="relative">
            <div class="btn-ghost"></div>
            <div class="btn-ghost" style="animation-delay: 0.8s"></div>
            <div class="btn-ghost" style="animation-delay: 1.6s"></div>
            <a href="#" hx-get="/analyze/{{ profile.id }}" hx-target="#analysis-area" hx-swap="innerHTML"
               class="relative z-10 block py-6 border border-accent/30 bg-accent/[0.05] hover:bg-accent/[0.12] cursor-pointer transition-colors rounded-xl shadow-[0_0_30px_-5px_rgb(var(--accent)/0.15)]">
                <div class="flex items-center justify-center gap-3">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" class="text-accent">
                        <polygon points="5 3 19 12 5 21 5 3"/>
                    </svg>
                    <span class="text-[16px] text-accent uppercase tracking-[0.25em]">Run Analysis</span>
                </div>
            </a>
        </div>
    </div>

    <div id="analysis-area"></div>
</div>
{% endblock %}
