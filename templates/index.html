{% extends "base.html" %}
{% block title %}Guardian - Security Advisor{% endblock %}

{% block content %}
<div class="slide-up">
    <div class="text-center mb-14">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-accent-muted mb-6 glow-pulse">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="text-accent-light">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
        </div>
        <h1 class="text-4xl font-bold tracking-[-0.03em] text-white mb-3">
            Your security, <span class="gradient-text">analyzed</span>
        </h1>
        <p class="text-[15px] text-gray-400 max-w-md mx-auto leading-relaxed">
            Set up your threat profile. Guardian investigates threats relevant
            to you and delivers a personalized security briefing.
        </p>
    </div>
</div>
{% endblock %}
