<!doctype html>
<html
    lang="en"
    class="h-full"
    data-mode="{{ 'online' if ai_mode() else 'offline' }}"
>
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
        <title>{% block title %}Dispatch{% endblock %}</title>

        <link
            rel="preconnect"
            href="https://fonts.googleapis.com"
        />
        <link
            rel="preconnect"
            href="https://fonts.gstatic.com"
            crossorigin
        />
        <link
            href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap"
            rel="stylesheet"
        />

        <script src="https://cdn.tailwindcss.com"></script>
        <script src="https://unpkg.com/htmx.org@2.0.4"></script>
        <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>

        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        fontFamily: {
                            sans: ['Inter', 'system-ui', 'sans-serif'],
                            mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
                        },
                        colors: {
                            bg: '#07080a',
                            surface: {
                                1: '#0d0e12',
                                2: '#131417',
                                3: '#1a1b1f',
                            },
                            border: {
                                1: 'rgba(255,255,255,0.07)',
                                2: 'rgba(255,255,255,0.12)',
                            },
                            dim: '#5a5b63',
                            muted: '#8b8c94',
                            accent: 'rgb(var(--accent) / <alpha-value>)',
                            status: {
                                green: '#22c55e',
                                red: '#ef4444',
                                orange: '#f97316',
                                yellow: '#eab308',
                                blue: '#3b82f6',
                            },
                        },
                        borderRadius: {
                            sm: '2px',
                            DEFAULT: '3px',
                            md: '4px',
                        },
                    },
                },
            };
        </script>

        <style>
            :root {
                --accent: 6 182 212;
                --surface-2: #131417;
                --color-dim: #5a5b63;
            }
            [data-mode="offline"] { --accent: 249 115 22; }

            * {
                -webkit-font-smoothing: antialiased;
            }

            /* --- animated starfield --- */

            #starfield {
                position: fixed;
                inset: 0;
                z-index: 0;
                pointer-events: none;
                overflow: hidden;
            }

            .stars-sm, .stars-md, .stars-lg {
                position: absolute;
                top: 0;
                left: 0;
                width: 1px;
                height: 1px;
                border-radius: 50%;
            }

            /* small stars: most numerous, dimmest, fastest twinkle */
            .stars-sm {
                animation: twinkle-a 4s ease-in-out infinite, drift 90s linear infinite;
                box-shadow:
                    12vw 8vh 0 0.3px rgba(255,255,255,0.15),
                    35vw 14vh 0 0.3px rgba(255,255,255,0.10),
                    58vw 5vh 0 0.4px rgba(255,255,255,0.12),
                    82vw 19vh 0 0.3px rgba(255,255,255,0.18),
                    7vw 32vh 0 0.3px rgba(255,255,255,0.10),
                    45vw 28vh 0 0.5px rgba(255,255,255,0.14),
                    68vw 41vh 0 0.3px rgba(255,255,255,0.12),
                    23vw 55vh 0 0.4px rgba(255,255,255,0.10),
                    91vw 48vh 0 0.3px rgba(255,255,255,0.16),
                    52vw 63vh 0 0.3px rgba(255,255,255,0.12),
                    15vw 75vh 0 0.5px rgba(255,255,255,0.10),
                    76vw 72vh 0 0.3px rgba(255,255,255,0.15),
                    38vw 85vh 0 0.4px rgba(255,255,255,0.12),
                    88vw 91vh 0 0.3px rgba(255,255,255,0.10),
                    5vw 95vh 0 0.3px rgba(255,255,255,0.14);
            }

            /* medium stars: fewer, brighter, offset twinkle */
            .stars-md {
                animation: twinkle-b 6s ease-in-out infinite 1.5s, drift 75s linear infinite;
                box-shadow:
                    28vw 12vh 0 0.8px rgba(255,255,255,0.25),
                    72vw 22vh 0 1px rgba(255,255,255,0.20),
                    48vw 38vh 0 0.8px rgba(255,255,255,0.30),
                    8vw 52vh 0 1px rgba(255,255,255,0.15),
                    85vw 45vh 0 0.8px rgba(255,255,255,0.35),
                    55vw 68vh 0 1px rgba(255,255,255,0.20),
                    18vw 78vh 0 0.8px rgba(255,255,255,0.25),
                    65vw 82vh 0 1px rgba(255,255,255,0.18),
                    92vw 65vh 0 0.8px rgba(255,255,255,0.30),
                    40vw 92vh 0 1px rgba(255,255,255,0.22);
            }

            /* large stars: rarest, brightest, reverse drift for parallax */
            .stars-lg {
                animation: twinkle-c 8s ease-in-out infinite 3s, drift 60s linear infinite reverse;
                box-shadow:
                    20vw 18vh 0 1.5px rgba(255,255,255,0.40),
                    62vw 10vh 0 2px rgba(255,255,255,0.30),
                    78vw 55vh 0 1.5px rgba(255,255,255,0.50),
                    35vw 70vh 0 2px rgba(255,255,255,0.35),
                    90vw 82vh 0 1.5px rgba(255,255,255,0.45),
                    10vw 42vh 0 2px rgba(255,255,255,0.60);
            }

            @keyframes twinkle-a {
                0%, 100% { opacity: 1; }
                50% { opacity: 0.4; }
            }
            @keyframes twinkle-b {
                0%, 100% { opacity: 1; }
                40% { opacity: 0.35; }
                70% { opacity: 0.8; }
            }
            @keyframes twinkle-c {
                0%, 100% { opacity: 1; }
                30% { opacity: 0.5; }
                60% { opacity: 0.3; }
                80% { opacity: 0.7; }
            }
            @keyframes drift {
                0% { transform: translateY(0); }
                100% { transform: translateY(-30px); }
            }

            /* nebula: layered radial gradients for atmospheric depth */
            .nebula {
                position: absolute;
                inset: 0;
                background:
                    radial-gradient(ellipse 800px 600px at 15% 25%, rgb(var(--accent) / 0.10) 0%, transparent 70%),
                    radial-gradient(ellipse 600px 500px at 75% 60%, rgba(26, 16, 64, 0.08) 0%, transparent 65%),
                    radial-gradient(ellipse 700px 500px at 80% 75%, rgb(var(--accent) / 0.08) 0%, transparent 65%),
                    radial-gradient(ellipse 600px 300px at 45% 90%, rgb(var(--accent) / 0.05) 0%, transparent 60%);
            }

            .fade-in {
                animation: fadeIn 0.2s ease-out both;
            }
            @keyframes fadeIn {
                from {
                    opacity: 0;
                }
                to {
                    opacity: 1;
                }
            }

            .timeline-enter {
                animation: timelineIn 200ms cubic-bezier(0.215, 0.61, 0.355, 1) both;
            }
            @keyframes timelineIn {
                from { opacity: 0; transform: translateY(6px); }
                to { opacity: 1; transform: translateY(0); }
            }

            .btn-ghost {
                position: absolute;
                inset: 0;
                border: 1px solid rgb(var(--accent) / 0.25);
                border-radius: 0.75rem;
                pointer-events: none;
                animation: ghostRise 2.4s ease-out infinite;
            }
            @keyframes ghostRise {
                0% { opacity: 0.6; transform: translateY(0) scale(1.02); }
                100% { opacity: 0; transform: translateY(-100px) scaleX(0.90) scaleY(0.75); }
            }

            .space-glow {
                position: relative;
            }
            .space-glow::before {
                content: '';
                position: absolute;
                top: -60px;
                left: 50%;
                transform: translateX(-50%);
                width: 800px;
                height: 500px;
                background: radial-gradient(ellipse, rgb(var(--accent) / 0.10) 0%, transparent 70%);
                pointer-events: none;
            }

            .analyzing-pulse {
                animation: pulse 2s ease-in-out infinite;
            }
            @keyframes pulse {
                0%, 100% { border-color: rgba(255,255,255,0.07); }
                50% { border-color: rgb(var(--accent) / 0.2); }
            }

            .htmx-settling {
                opacity: 0;
            }
            .htmx-added {
                opacity: 1;
                transition: opacity 0.15s ease-out;
            }

            select,
            input {
                background-color: var(--surface-2);
                color: #e4e4e7;
            }
            select option {
                background: var(--surface-2);
            }

            .svc-toggle input { display: none; }
            .svc-toggle .box {
                width: 14px; height: 14px;
                border: 1px solid rgba(255,255,255,0.12);
                background: var(--surface-2);
                display: flex; align-items: center; justify-content: center;
                transition: border-color 0.1s ease, background-color 0.1s ease;
                flex-shrink: 0;
            }
            .svc-toggle input:checked + .box {
                border-color: rgb(var(--accent));
                background: rgb(var(--accent) / 0.15);
            }
            .svc-toggle input:checked + .box::after {
                content: '';
                width: 6px; height: 6px;
                background: rgb(var(--accent));
            }
            .svc-toggle:hover .box { border-color: rgba(255,255,255,0.2); }

            ::-webkit-scrollbar {
                width: 4px;
            }
            ::-webkit-scrollbar-track {
                background: transparent;
            }
            ::-webkit-scrollbar-thumb {
                background: rgba(255, 255, 255, 0.06);
            }
            ::-webkit-scrollbar-thumb:hover {
                background: rgba(255, 255, 255, 0.1);
            }

            details summary::-webkit-details-marker { display: none; }
            details summary { list-style: none; }

            [data-mode="online"] .toggle-on {
                background: rgb(var(--accent) / 0.1);
                color: rgb(var(--accent));
            }
            [data-mode="online"] .toggle-off {
                color: var(--color-dim);
            }
            [data-mode="offline"] .toggle-on {
                color: var(--color-dim);
            }
            [data-mode="offline"] .toggle-off {
                background: rgba(249,115,22,0.1);
                color: #f97316;
            }

            .custom-select { position: relative; }
            .select-trigger {
                width: 100%;
                display: flex;
                align-items: center;
                justify-content: space-between;
                background: var(--surface-2);
                border: 1px solid rgba(255,255,255,0.07);
                padding: 10px 16px;
                font-size: 13px;
                color: #e4e4e7;
                cursor: pointer;
                transition: border-color 0.15s ease;
            }
            .select-trigger:hover { border-color: rgba(255,255,255,0.12); }
            .select-trigger.invalid { border-color: #ef4444; }
            .select-label.placeholder { color: var(--color-dim); }
            .select-chevron {
                width: 12px; height: 12px;
                color: var(--color-dim);
                flex-shrink: 0;
                transition: transform 0.15s ease-out;
            }
            .custom-select.open .select-chevron { transform: rotate(180deg); }
            .select-dropdown {
                position: absolute;
                top: calc(100% + 2px);
                left: 0; right: 0;
                background: var(--surface-2);
                border: 1px solid rgba(255,255,255,0.07);
                max-height: 200px;
                overflow-y: auto;
                z-index: 50;
                opacity: 0;
                transform: translateY(-4px);
                pointer-events: none;
                transition: opacity 0.12s ease-out, transform 0.12s ease-out;
            }
            .custom-select.open .select-dropdown {
                opacity: 1;
                transform: translateY(0);
                pointer-events: auto;
            }
            .select-option {
                padding: 8px 16px;
                font-size: 13px;
                color: #8b8c94;
                cursor: pointer;
                transition: background 0.1s ease, color 0.1s ease;
            }
            .select-option:hover {
                background: rgba(255,255,255,0.04);
                color: #e4e4e7;
            }
            .select-option.selected { color: rgb(var(--accent)); }

            .htmx-indicator { display: none; }
            .htmx-request .htmx-indicator,
            .htmx-request.htmx-indicator { display: block; }

            /* active nav link underline */
            .nav-active {
                color: white;
                position: relative;
            }
            .nav-active::after {
                content: '';
                position: absolute;
                bottom: -4px;
                left: 0;
                right: 0;
                height: 2px;
                background: rgb(var(--accent));
                border-radius: 1px;
            }

            /* shield logo pulse */
            .shield-pulse {
                animation: shieldGlow 3s ease-in-out infinite;
            }
            @keyframes shieldGlow {
                0%, 100% { filter: drop-shadow(0 0 2px rgb(var(--accent) / 0.3)); }
                50% { filter: drop-shadow(0 0 8px rgb(var(--accent) / 0.7)); }
            }

            @media (prefers-reduced-motion: reduce) {
                .fade-in { animation: none; }
                .timeline-enter { animation: none; }
                .btn-ghost { animation: none; display: none; }
                .analyzing-pulse { animation: none; }
                .stars-sm, .stars-md, .stars-lg { animation: none; }
                .shield-pulse { animation: none; }
                .htmx-added { transition: none; }
                .svc-toggle .box { transition: none; }
                .select-chevron { transition: none; }
                .select-dropdown { transition: none; }
                .select-trigger { transition: none; }
                .select-option { transition: none; }
            }
        </style>
    </head>
    <body class="h-full bg-bg text-gray-300 font-sans text-[13px]">
        <div id="starfield">
            <div class="stars-sm"></div>
            <div class="stars-md"></div>
            <div class="stars-lg"></div>
            <div class="nebula"></div>
        </div>
        <div class="min-h-full flex flex-col relative z-[1]">
            <nav class="sticky top-0 z-50 px-6 pt-3">
                <div class="mx-auto max-w-3xl rounded-xl border border-border-1 bg-surface-1/80 backdrop-blur-md">
                    <div class="px-6 h-12 flex items-center justify-between font-mono">
                        <a href="/" class="flex items-center gap-2 font-bold text-white text-[13px] tracking-tight">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="text-accent shield-pulse">
                                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                            </svg>
                            DISPATCH
                        </a>
                        <div class="flex items-center gap-5 text-[12px]">
                            <a href="/" class="{% if request.url.path == '/' or '/profiles' in request.url.path or '/analyze' in request.url.path %}nav-active{% else %}text-dim{% endif %} hover:text-white transition-colors">Analyze</a>
                            <a href="/phishing" class="{% if '/phishing' in request.url.path %}nav-active{% else %}text-dim{% endif %} hover:text-white transition-colors">Phishing</a>
                            <a href="/password" class="{% if '/password' in request.url.path %}nav-active{% else %}text-dim{% endif %} hover:text-white transition-colors">Password</a>
                            <span class="text-border-2 mx-1">|</span>
                            <a href="/alerts" class="{% if '/alerts' in request.url.path %}nav-active{% else %}text-dim{% endif %} hover:text-white transition-colors">Alerts</a>
                            <a href="/audit" class="{% if '/audit' in request.url.path %}nav-active{% else %}text-dim{% endif %} hover:text-white transition-colors">Audit</a>
                            <div id="ai-toggle" class="flex border border-border-2 ml-2 cursor-pointer select-none" onclick="toggleAI()">
                                <span class="toggle-on px-2.5 py-1 text-[11px] tracking-widest border-r border-border-2 transition-colors duration-150 ease">ONLINE</span>
                                <span class="toggle-off px-2.5 py-1 text-[11px] tracking-widest transition-colors duration-150 ease">OFFLINE</span>
                            </div>
                        </div>
                    </div>
                </div>
            </nav>

            <main class="mx-auto {% block main_class %}max-w-3xl{% endblock %} w-full px-6 py-10 flex-1">
                {% block content %}{% endblock %}
            </main>

            <footer class="border-t border-border-1 py-4">
                <div class="mx-auto max-w-5xl px-6 flex items-center justify-between text-[11px] font-mono text-dim">
                    <span>DISPATCH v0.1</span>
                    <span>COMMUNITY SAFETY & DIGITAL WELLNESS</span>
                </div>
            </footer>
        </div>

        <script>
            document.addEventListener('DOMContentLoaded', () => {
                document.querySelectorAll('.custom-select').forEach(sel => {
                    const trigger = sel.querySelector('.select-trigger');
                    const dropdown = sel.querySelector('.select-dropdown');
                    const hidden = sel.querySelector('input[type="hidden"]');
                    const label = sel.querySelector('.select-label');

                    trigger.addEventListener('click', (e) => {
                        e.stopPropagation();
                        document.querySelectorAll('.custom-select.open').forEach(s => {
                            if (s !== sel) s.classList.remove('open');
                        });
                        sel.classList.toggle('open');
                    });

                    sel.querySelectorAll('.select-option').forEach(opt => {
                        opt.addEventListener('click', () => {
                            hidden.value = opt.dataset.value;
                            label.textContent = opt.textContent;
                            label.classList.remove('placeholder');
                            trigger.classList.remove('invalid');
                            sel.classList.remove('open');
                            sel.querySelectorAll('.select-option').forEach(o => o.classList.remove('selected'));
                            opt.classList.add('selected');
                        });
                    });
                });

                document.addEventListener('click', () => {
                    document.querySelectorAll('.custom-select.open').forEach(s => s.classList.remove('open'));
                });

                document.querySelectorAll('form').forEach(form => {
                    form.addEventListener('submit', (e) => {
                        let valid = true;
                        form.querySelectorAll('.custom-select input[type="hidden"]').forEach(input => {
                            if (input.hasAttribute('required') && !input.value) {
                                valid = false;
                                input.closest('.custom-select').querySelector('.select-trigger').classList.add('invalid');
                            }
                        });
                        if (!valid) e.preventDefault();
                    });
                });
            });

            async function toggleAI() {
                const res = await fetch('/toggle-ai', { method: 'POST' });
                const { enabled } = await res.json();
                document.documentElement.dataset.mode = enabled ? 'online' : 'offline';
                var area = document.getElementById('analysis-area');
                if (area && area.innerHTML.trim()) location.reload();
            }

            setInterval(function() {
                document.querySelectorAll('.live-timer').forEach(function(el) {
                    if (!el.dataset.t) el.dataset.t = Date.now();
                    el.textContent = ((Date.now() - parseInt(el.dataset.t)) / 1000).toFixed(1) + 's';
                });
            }, 100);
        </script>
    </body>
</html>
