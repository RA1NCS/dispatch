<!doctype html>
<html lang="en" class="h-full antialiased">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Guardian{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Geist', 'system-ui', 'sans-serif'],
                        mono: ['Geist Mono', 'ui-monospace', 'monospace'],
                    },
                    colors: {
                        surface: {
                            0: '#06080d',
                            1: '#0c1018',
                            2: '#121824',
                            3: '#1a2232',
                            4: '#232d40',
                        },
                        stroke: {
                            1: 'rgba(255, 255, 255, 0.06)',
                            2: 'rgba(255, 255, 255, 0.1)',
                            3: 'rgba(255, 255, 255, 0.16)',
                        },
                        accent: {
                            DEFAULT: '#6366f1',
                            light: '#818cf8',
                            muted: 'rgba(99, 102, 241, 0.12)',
                        },
                        status: {
                            safe: '#34d399',
                            warn: '#fbbf24',
                            danger: '#f87171',
                            info: '#60a5fa',
                        },
                    },
                },
            },
        };
    </script>

    <style>
        * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        body { font-feature-settings: 'ss01', 'ss02', 'cv01'; letter-spacing: -0.011em; }

        .fade-in {
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        .fade-in-delay-1 { animation-delay: 0.06s; }
        .fade-in-delay-2 { animation-delay: 0.12s; }
        .fade-in-delay-3 { animation-delay: 0.18s; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .glow-pulse {
            animation: glowPulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 12px -2px rgba(99, 102, 241, 0.25); }
            50% { box-shadow: 0 0 24px -2px rgba(99, 102, 241, 0.45); }
        }

        .slide-up {
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .htmx-settling { opacity: 0; }
        .htmx-added { transition: opacity 0.3s cubic-bezier(0.16, 1, 0.3, 1); opacity: 1; }
        .htmx-swapping { opacity: 0; transition: opacity 0.15s ease-out; }

        .card {
            background: linear-gradient(145deg, rgba(18, 24, 36, 0.8), rgba(12, 16, 24, 0.9));
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            backdrop-filter: blur(8px);
        }
        .card:hover {
            border-color: rgba(255, 255, 255, 0.1);
            transition: border-color 0.2s ease;
        }

        .nav-link {
            position: relative;
            padding: 0.25rem 0;
        }
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 0;
            height: 1.5px;
            background: linear-gradient(90deg, #6366f1, #34d399);
            border-radius: 1px;
            transition: width 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .nav-link:hover::after,
        .nav-link.active::after {
            width: 100%;
        }

        .gradient-text {
            background: linear-gradient(135deg, #818cf8, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .noise-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.015;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            z-index: 9999;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.08); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.14); }
    </style>
</head>
<body class="h-full bg-surface-0 text-gray-200 font-sans">
    <div class="noise-overlay"></div>
    <div class="min-h-full flex flex-col">
        <nav class="border-b border-stroke-1 bg-surface-1/70 backdrop-blur-xl sticky top-0 z-50">
            <div class="mx-auto max-w-5xl px-6 py-4 flex items-center justify-between">
                <a href="/" class="flex items-center gap-2.5 group">
                    <div class="w-8 h-8 rounded-lg bg-accent-muted flex items-center justify-center group-hover:glow-pulse transition-all duration-300">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-accent-light">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                        </svg>
                    </div>
                    <span class="text-[15px] font-semibold tracking-[-0.02em] text-white">Guardian</span>
                </a>
                <div class="flex items-center gap-1">
                    <a href="/" class="nav-link text-[13px] text-gray-400 hover:text-white transition-colors px-3 py-1.5 rounded-md hover:bg-white/[0.04]">Home</a>
                    <a href="/alerts" class="nav-link text-[13px] text-gray-400 hover:text-white transition-colors px-3 py-1.5 rounded-md hover:bg-white/[0.04]">Alerts</a>
                    <a href="/phishing" class="nav-link text-[13px] text-gray-400 hover:text-white transition-colors px-3 py-1.5 rounded-md hover:bg-white/[0.04]">Phishing</a>
                    <a href="/password" class="nav-link text-[13px] text-gray-400 hover:text-white transition-colors px-3 py-1.5 rounded-md hover:bg-white/[0.04]">Password</a>
                    <a href="/audit" class="nav-link text-[13px] text-gray-400 hover:text-white transition-colors px-3 py-1.5 rounded-md hover:bg-white/[0.04]">Audit Log</a>
                </div>
            </div>
        </nav>

        <main class="mx-auto max-w-5xl w-full px-6 py-10 flex-1">
            {% block content %}{% endblock %}
        </main>

        <footer class="border-t border-stroke-1 py-6">
            <div class="mx-auto max-w-5xl px-6 flex items-center justify-between text-[12px] text-gray-500">
                <span>Guardian v0.1</span>
                <span class="flex items-center gap-1.5">
                    <span class="w-1.5 h-1.5 rounded-full bg-status-safe animate-pulse"></span>
                    System Operational
                </span>
            </div>
        </footer>
    </div>
</body>
</html>
